version: '3.8'

services:
  # Backend - Go API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DIARY_SEED_USERS: ${DIARY_SEED_USERS:-}
      DIARY_DATAPATH: ${DIARY_DATAPATH:-/data}
      DIARY_ALLOWEDORIGINS: ${DIARY_ALLOWEDORIGINS:-http://localhost,http://localhost:80,http://localhost:8080}
      DIARY_JWT_SECRET: ${DIARY_JWT_SECRET:-}
      DIARY_COOKIE_SECURE: ${DIARY_COOKIE_SECURE:-false}
      DIARY_PORT: ${DIARY_PORT:-8080}
      DIARY_MAXPERFILESIZEMB: ${DIARY_MAXPERFILESIZEMB:-200}
      DIARY_MAXBATCHFILES: ${DIARY_MAXBATCHFILES:-100}
      DIARY_MAXBATCHTOTALSIZEMB: ${DIARY_MAXBATCHTOTALSIZEMB:-1000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      # External volume for database and assets
      - ${DIARY_DATA_PATH:-./diary-data}:/data
    networks:
      - diary-network

  # Frontend - Next.js
  frontend:
    build:
      context: ./next-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    environment:
      # API URL for the browser
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - backend
    networks:
      - diary-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - backend
      - frontend
    networks:
      - diary-network

networks:
  diary-network:
    driver: bridge
